; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = ./src
data_dir = ../../data

[env]
framework = arduino
board_build.filesystem = littlefs
lib_extra_dirs = ../../

; Note: No extra lib_deps needed - arduino-pico core includes WiFi and WebServer
; ESPUI uses ArduinoJson if available, otherwise uses internal JSON handling

; Ignore ESP-specific async TCP libraries - RP2040 uses synchronous WebServer
lib_ignore =
	ESP Async WebServer
	AsyncTCP
	AsyncTCP_RP2040W
	me-no-dev/AsyncTCP
	me-no-dev/ESPAsyncTCP
	bblanchon/ArduinoJson

[env:pico_w]
; Raspberry Pi Pico W with arduino-pico core
platform = https://github.com/earlephilhower/arduino-pico.git
board = rpipicow
board_build.filesystem_size = 1m
upload_protocol = picotool
monitor_speed = 115200
build_flags =
   -D ARDUINO_ARCH_RP2040
   -D ESPUI_PLATFORM=\"RP2040\"
   -D PICO_W
   -Wl,--wrap=ethernet_read
   -Wl,--wrap=ethernet_write

[env:pico]
; Raspberry Pi Pico (non-W) with arduino-pico core
platform = https://github.com/earlephilhower/arduino-pico.git
board = rpipico
board_build.filesystem_size = 1m
upload_protocol = picotool
monitor_speed = 115200
build_flags =
   -D ARDUINO_ARCH_RP2040
   -D ESPUI_PLATFORM=\"RP2040\"
